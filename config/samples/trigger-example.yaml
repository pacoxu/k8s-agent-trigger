# Example: Deployment that will be watched by k8s-agent-trigger
# When this Deployment's spec changes (generation increments),
# the controller dispatches a trigger event to the Agent service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: default
  labels:
    app: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.0
          ports:
            - containerPort: 80
---
# Example: Job that will be diagnosed by k8s-agent-trigger if it fails
apiVersion: batch/v1
kind: Job
metadata:
  name: data-processing
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: processor
          image: busybox:1.36.0
          command: ["/bin/sh", "-c", "echo Processing data; exit 0"]
      restartPolicy: Never
  backoffLimit: 3
---
# Example: Secret to configure the Agent endpoint (referenced by the manager Deployment)
apiVersion: v1
kind: Secret
metadata:
  name: k8s-agent-trigger-config
  namespace: system
type: Opaque
stringData:
  agent-endpoint: "http://agent-service.default.svc.cluster.local:8080/api/v1/agent/run"
