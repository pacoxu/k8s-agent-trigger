apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8s-agent-trigger
  namespace: k8s-agent-trigger-system
  labels:
    app.kubernetes.io/name: k8s-agent-trigger
    app.kubernetes.io/component: controller-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8s-agent-trigger
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: k8s-agent-trigger-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
    # Allow HTTPS egress for managed Kubernetes API endpoints and external Agent endpoints.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
