apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-agent-trigger
  namespace: system
  labels:
    app.kubernetes.io/name: k8s-agent-trigger
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-agent-trigger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-agent-trigger
    spec:
      serviceAccountName: k8s-agent-trigger
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/pacoxu/k8s-agent-trigger:latest
          args:
            - "--agent-endpoint=$(AGENT_ENDPOINT)"
            - "--recorder-namespace=$(POD_NAMESPACE)"
            - "--leader-elect=true"
            - "--metrics-bind-address=:8080"
            - "--health-probe-bind-address=:8081"
          env:
            - name: AGENT_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: k8s-agent-trigger-config
                  key: agent-endpoint
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10
